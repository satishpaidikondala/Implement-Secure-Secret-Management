version: '3.8'

services:
  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "my-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 5

  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - ./scripts/setup-vault.sh:/usr/local/bin/setup-vault.sh
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: "my-root-token"
    command: "/bin/sh -c '/usr/local/bin/setup-vault.sh && sleep infinity'"

  app:
    build: .
    container_name: app
    ports:
      - "8080:8080"
    depends_on:
      vault-init:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: user-profile-service
      SPRING_CONFIG_IMPORT: vault://
      SPRING_CLOUD_VAULT_HOST: vault
      SPRING_CLOUD_VAULT_PORT: 8200
      SPRING_CLOUD_VAULT_SCHEME: http
      SPRING_CLOUD_VAULT_AUTHENTICATION: TOKEN
      SPRING_CLOUD_VAULT_TOKEN: "my-root-token"
